name: Deploy to app service

on:
  push:
    branches:
      - main

jobs:
  unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Run unit tests
        run: pnpm test:unit
  buildimage:
    name: Build and push Docker image
    needs: "unit-tests"
    environment: production
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.DOCKER_REGISTRY_URL }}
          username: ${{ secrets.DIGITALOCEAN_USERNAME }}
          password: ${{ secrets.DIGITALOCEAN_TOKEN }}
      - name: Construct environment file
        run: |
          cat <<EOF > .env.production

          PAYLOAD_SECRET${{ secrets.PAYLOAD_SECRET }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}

          COMPANY_NAME=${{ vars.COMPANY_NAME }}
          SITE_NAME=${{ vars.SITE_NAME }}

          PAYLOAD_PUBLIC_SERVER_URL=${{ vars.SERVER_PUBLIC_URL }}
          NEXT_PUBLIC_SERVER_URL=${{ vars.SERVER_PUBLIC_URL }}

          # Used to preview drafts
          PREVIEW_SECRET=${{ secrets.PREVIEW_SECRET }}

          # Email
          SMTP_HOST=${{ vars.SMTP_HOST }}
          SMTP_PORT=${{ vars.SMTP_PORT }}
          SMTP_USER=${{ vars.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}

          # Persistent storage
          S3_ENABLED=true
          S3_BUCKET=${{ vars.S3_BUCKET }}
          S3_ACCESS_KEY_ID=${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY=${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_REGION=${{ vars.S3_REGION }}
          S3_ENDPOINT=${{ vars.S3_ENDPOINT }}

          # Stripe API keys
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}

          # Umami analytics
          UMAMI_WEBSITE_ID=${{ vars.UMAMI_WEBSITE_ID }}

          # Discord webhook
          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}

          EOF
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: "${{ secrets.DOCKER_REGISTRY_URL }}/lepi-labs-payload:main"
